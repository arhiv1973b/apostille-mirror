      .total-count {

      }
      footer {
        border-top: 1px solid #444;
        padding-top: 20px;
        margin-top: 40px;

      .legal-note {
        background: #2a2a2a;
        padding: 15px;
        border: 1px solid #444;

      .legal-note strong {

      }
      .header-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
  <body>

    <script>
      const translations = {
        ru: {
          totalCount: 'Всего документов-триггеров:',
          triggersTitle: '📌 Документы-триггеры (Цепь нарушений)',
          legalTitle: 'Юридическая справка:',
          legalText: 'Нарушение статей 3 и 6 Конвенции в данном деле носит длящийся характер. "Ошибка" в фамилии и мануальный способ ведения дел — не техническая погрешность, а преднамеренное отступление от норм jus cogens.',
          statusTag: 'ЖЕРТВА ПЫТОК',
          warningTag: 'I ГРУППА ИНВАЛИДНОСТИ',
          openDoc: 'Открыть документ (PDF)',
          date: 'Дата',
          case: 'Дело',
          type: 'Тип',
          loading: 'Загрузка данных...',
          error: 'Ошибка загрузки данных:'
        },
        en: {
          totalCount: 'Total trigger documents:',
          triggersTitle: '📌 Trigger Documents (Chain of Violations)',
          legalTitle: 'Legal Note:',
          legalText: 'The violation of Articles 3 and 6 of the Convention in this case is of a continuing nature. The "error" in the surname and manual case handling is not a technical glitch but a deliberate departure from jus cogens norms.',
          statusTag: 'TORTURE VICTIM',
          warningTag: 'DISABILITY GROUP I',
          openDoc: 'Open Document (PDF)',
          date: 'Date',
          case: 'Case',
          type: 'Type',
          loading: 'Loading data...',
          error: 'Error loading data:'
        }
      };

      let currentLang = localStorage.getItem('lang') || 'ru';

      function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        
        document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        
        document.getElementById('total-count-label').innerHTML = 
          translations[lang].totalCount + ' <span id="total-count">' + document.getElementById('total-count').textContent + '</span>';
        document.getElementById('triggers-title').textContent = translations[lang].triggersTitle;
        document.getElementById('legal-title').textContent = translations[lang].legalTitle;
        document.querySelector('#legal-note p').textContent = translations[lang].legalText;
        
        document.querySelector('.status-tag').textContent = translations[lang].statusTag;
        document.querySelector('.warning-tag').textContent = translations[lang].warningTag;
        
        document.querySelectorAll('.evidence-card').forEach(card => {
          const link = card.querySelector('a');
          if (link) link.textContent = translations[lang].openDoc;
        });
        
        renderEvidence();
      }

      function renderEvidence() {
        const container = document.getElementById('evidence-container');
        const t = translations[currentLang];
        
        fetch('registry.json')
          .then((response) => response.json())
          .then((data) => {
            const triggers = data.evidence_triggers;
            document.getElementById('total-count').textContent = triggers.length;
            document.getElementById('total-count-label').innerHTML = 
              t.totalCount + ' <span id="total-count">' + triggers.length + '</span>';
            container.innerHTML = '';
            triggers.forEach((item) => {
              const card = document.createElement('div');
              card.className = 'evidence-card';
              card.innerHTML = `
                          <h3>${item.title}</h3>
                          <div class="meta">
                              <strong>ID:</strong> ${item.id} | 
                              <strong>${t.date}:</strong> ${item.date || 'N/A'} | 
                              <strong>${t.case}:</strong> ${item.case || 'N/A'}
                          </div>
                          <div class="meta">
                              <strong>${t.type}:</strong> ${item.type}
                          </div>
                          <div class="impact">${item.impact}</div>
                          <a href="${item.link}" target="_blank">${t.openDoc}</a>
                      `;
              container.appendChild(card);
            });
          })
          .catch((err) => {
            document.getElementById('evidence-container').innerHTML =
              '<p style="color: #b22222;">' + t.error + ' ' + err.message + '</p>';
          });
      }

      document.getElementById('btn-ru').classList.toggle('active', currentLang === 'ru');
      document.getElementById('btn-en').classList.toggle('active', currentLang === 'en');
      
      renderEvidence();
    </script>
  </body>
