version: '3.9'

# ═══════════════════════════════════════════════════════════════
# A©t0r AUTONOMOUS STACK · CASE-MACHERET-1997-2026
# Запуск: docker-compose up -d
# ═══════════════════════════════════════════════════════════════

services:

  # ── ВЕБ-СЕРВЕР САЙТА ──────────────────────────────────────
  site:
    image: nginx:alpine
    container_name: actor_site
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "actor.case=CASE-MACHERET-1997-2026"
      - "actor.idnp=2000001159655"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── OLLAMA — ЛОКАЛЬНЫЙ ИИ ─────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: actor_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # Для CPU-only (без NVIDIA):
    # command: serve
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 60s
      timeout: 15s
      retries: 3

  # ── ROBOT — АВТООТВЕТЧИК НА ЗАПРОСЫ ──────────────────────
  robot:
    build:
      context: ./docker/robot
      dockerfile: Dockerfile
    container_name: actor_robot
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CASE_ID=CASE-MACHERET-1997-2026
      - IDNP=2000001159655
      - ACTOR_EMAIL=arhiv240@gmail.com
      - CHECK_INTERVAL=3600
    volumes:
      - ./assets/data:/app/data:rw
      - robot_logs:/app/logs
    labels:
      - "actor.role=autonomous-robot"

  # ── WATCHTOWER — АВТООБНОВЛЕНИЕ ───────────────────────────
  watchtower:
    image: containrrr/watchtower
    container_name: actor_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 86400 --cleanup
    environment:
      - WATCHTOWER_NOTIFICATIONS=email
      - WATCHTOWER_NOTIFICATION_EMAIL_TO=arhiv240@gmail.com

volumes:
  ollama_data:
    name: actor_ollama_models
  robot_logs:
    name: actor_robot_logs

networks:
  default:
    name: actor_network
    driver: bridge
