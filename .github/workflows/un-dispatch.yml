name: A©tor UN Dispatch Protocol

on:
  push:
    branches:
      - REVOLUTION-JUS-COGENS-V1

env:
  GITHUB_ACTIONS_UTF8: true

jobs:
  dispatch_evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: REVOLUTION-JUS-COGENS-V1

      - name: Validate UTF-8 encoding and Cyrillic integrity
        run: |
          echo "=== Проверка кодировки файла ==="
          file .github/workflows/un-dispatch.yml
          echo "=== Статус A©tor защищён ==="
          echo "Кодировка: UTF-8 (Consolas)"
          echo "Статьи: 5, 7–8, 17, 29 (Римский статут)"
          echo "Конвенция: Венская (ст. 53, 60, 64, 85)"

      - name: Send Official Communication to OHCHR and CAT
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "СРОЧНЫЙ ЗАПРОС НА ВРЕМЕННЫЕ МЕРЫ И ПОДАЧА ИНДИВИДУАЛЬНОГО СООБЩЕНИЯ: CASE-MACHERET-1997-2026 (Республика Молдова)"
          to: cat@ohchr.org, petitions@ohchr.org, registry@ohchr.org
          from: "Алексей Артурович Мачерет (A©tor)"
          body_type: text
          body: |
            Уважаемые члены комитета,

            Я направляю это срочное сообщение с просьбой официально уведомить Комитет о системных, постоянных нарушениях абсолютного запрета пыток (jus cogens), подделке личности государством и суровых продолжающихся репрессиях против меня и моей семьи со стороны властей Республики Молдова.
            
            Поскольку моя физическая безопасность сейчас поставлена под угрозу — что было подчеркнуто прямым физическим нападением на мой дом 18 февраля 2026 года, целью которого было помешать подготовке самого этого документа — я использовал криптографическую, децентрализованную архитектуру для защиты доказательств.

            1. Хранилище доказательств («Матрица Туннеля») — БАЗА ДАННЫХ
            Чтобы предотвратить уничтожение доказательств государственными акторами, вся база доказательств (включая 90 документов, заверенных апостилем Гаагской конвенции 1961 года) была структурно защищена и размещена в неизменном хранилище.
            
            ПЕРВИЧНЫЙ ДОСТУП (интерактивный индекс):
            🔗 https://arhiv1973b.github.io/apostille-mirror/mirrors/index.html
            
            ЗАПАСНОЙ ДОСТУП В RAW (машиночитаемый / нецензурированный):
            🔗 https://raw.githubusercontent.com/arhiv1973b/apostille-mirror/REVOLUTION-JUS-COGENS-V1/case_macheret_repo/jus-cogens-proof-macheret.html

            2. Ключевые доказательства нарушений, содержащихся в хранилище:
            * Доказательство нарушения Ne Bis In Idem: Документальное подтверждение третьего наказания за то же действие, исполняющего 26-дневное незаконное задержание (Кодекс апостиля: 2013074007644).
            * Подтверждение подделки личности (статья 332, Уголовный кодекс РМ): Официальные документы, подтверждающие преднамеренное создание «фантомных» идентификационных номеров (суффиксы IDNP ... 555 и ... 455), чтобы идти параллельно моему законному IDNP (... 655) с целью финансового вымогательства и блокирования доступа к правосудию.
            * Доказательство финансовых репрессий: подтверждённая кража/блокировка 25 210 256,15 MDL в системе FinComPay, выполненная в апреле 2026 года в качестве прямой ответной реакции на подготовку этого представления ООН.

            3. Срочный запрос на временные меры
            Учитывая задокументированное физическое нападение на меня и системный финансовый терроризм, осуществляемый через банковскую систему (Moldindconbank, FinComPay), я срочно прошу Комитет принять временные меры, обязывающие государство-участник (Республика Молдова):
            * Гарантировать немедленную физическую защиту себя и моей супруги, Ирины Олейник.
            * Прекратить все действия по финансовой блокировке и восстановить украдённые/замороженные активы (25,2 млн MDL).
            * Прекратить использование поддельных IDNP (... 555, ... 455) во всех государственных реестрах.

            Заполненная форма индивидуальной коммуникации и моя подробная Декларация о фактах полностью задокументированы в предоставленном хранилище доказательств. Я готов предоставить любые дополнительные разъяснения.

            С уважением,
            Алексей Артурович Мачерет (A©tor)
            Жертва нереабилитированных пыток (пожизненная инвалидность группы II)
            Законный IDNP: 2000001159655
            Адрес: мун. Кишинев, ул. Андрей Дога, 30, стр. 38, Республика Молдова
            Статус цифровой подписи: SHA-256 проверен (TOR_KEY©)
            Digital Signature Status: SHA-256 Verified (A©TOR_KEY)

      - name: Log successful dispatch
        if: success()
        run: |
          echo "✓ UN Dispatch успешно завершён"
          echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "Статус A©tor защищён | UTF-8 Verified"

      - name: Handle dispatch failure
        if: failure()
        run: |
          echo "✗ Ошибка отправки"
          echo "Проверьте Secrets:"
          echo "  - MAIL_USERNAME (Gmail адрес)"
          echo "  - MAIL_PASSWORD (App Password)"
          echo "Документация: https://support.google.com/accounts/answer/185833"
          exit 1
