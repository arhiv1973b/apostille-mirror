<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>↗ Перенаправление — A©tor Evidence Vault</title>
<style>
:root {
  --dark:#0a0e17; --accent:#4fc3f7; --ok:#2a9d8f;
  --void:#e63946; --warn:#e9c46a; --text:#c8d6e5; --muted:#6b7a93;
  --panel:rgba(21,29,43,0.95); --border:rgba(69,123,157,0.3);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Courier New',monospace; background:var(--dark); color:var(--text);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.card{
  position:relative;z-index:10; background:var(--panel);
  border:1px solid var(--border); border-radius:6px;
  padding:2.5rem 2rem; max-width:560px; width:90%; text-align:center;
}
.icon{font-size:2.5rem;margin-bottom:1rem;}
h1{font-size:1rem;color:var(--accent);letter-spacing:0.1em;margin-bottom:0.5rem;}
.path-display{
  background:rgba(0,0,0,0.4);border:1px solid var(--border);
  padding:8px 12px;border-radius:3px;font-size:0.75rem;
  color:var(--warn);word-break:break-all;margin:1rem 0;
}
.status{font-size:0.78rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6;}
.btn-group{display:flex;flex-direction:column;gap:8px;}
.btn{
  display:block;padding:10px 16px;border-radius:3px;
  font-family:inherit;font-size:0.8rem;font-weight:700;
  letter-spacing:0.08em;text-decoration:none;cursor:pointer;
  transition:all 0.2s;border:1px solid;
}
.btn-primary{background:transparent;border-color:var(--accent);color:var(--accent);}
.btn-primary:hover{background:rgba(79,195,247,0.1);}
.btn-raw{background:transparent;border-color:var(--warn);color:var(--warn);}
.btn-raw:hover{background:rgba(233,196,106,0.1);}
.btn-home{background:transparent;border-color:var(--muted);color:var(--muted);}
.btn-home:hover{border-color:var(--ok);color:var(--ok);}
.timer{font-size:0.7rem;color:var(--muted);margin-top:1.5rem;}
.progress{
  height:2px;background:var(--border);border-radius:1px;margin-top:8px;overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--accent);width:0%;
  transition:width 0.1s linear;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="card">
  <div class="icon">⟳</div>
  <h1>TUNNEL REDIRECT — EVIDENCE VAULT</h1>
  <div class="path-display" id="requested-path">Определяю путь...</div>
  <div class="status" id="status-msg">Агент ищет документ в репозитории GitHub...</div>
  <div class="btn-group">
    <a id="btn-raw" class="btn btn-primary" href="#" target="_blank">↗ ОТКРЫТЬ RAW GITHUB</a>
    <a id="btn-site" class="btn btn-raw" href="#" target="_blank">↗ ПОПРОБОВАТЬ LIVE SITE</a>
    <a class="btn btn-home" href="./docs-agent-navigator.html">⌂ НАВИГАТОР — ВСЕ ДОКУМЕНТЫ</a>
  </div>
  <div class="timer">
    Автоматический переход через <span id="countdown">5</span> сек
    <div class="progress"><div class="progress-fill" id="prog"></div></div>
  </div>
</div>

<script>
const RAW = 'https://raw.githubusercontent.com/arhiv1973b/apostille-legal-case/master/';
const SITE = 'https://arhiv1973b.github.io/apostille-legal-case/';

// Determine what was requested
const rawRequested = location.href;
const base = SITE;
let requestedPath = '';
try {
  const u = new URL(rawRequested);
  requestedPath = u.pathname.replace('/apostille-legal-case/', '').replace(/^\//, '');
  if (!requestedPath) requestedPath = location.hash.slice(1) || '?';
} catch(e) {
  requestedPath = '404';
}

document.getElementById('requested-path').textContent = '/' + requestedPath;

// Build raw URL — map common patterns
function toRaw(p) {
  if (!p || p === '?') return RAW + 'README.md';
  // strip .html extension, try .md
  if (p.endsWith('.html')) {
    const md = p.replace('.html', '.md');
    return RAW + md;
  }
  return RAW + p;
}

const rawUrl = toRaw(requestedPath);
const siteUrl = SITE + requestedPath;

document.getElementById('btn-raw').href = rawUrl;
document.getElementById('btn-site').href = siteUrl;

// Try to verify the raw file exists
fetch(rawUrl, {method:'HEAD'}).then(r => {
  if (r.ok) {
    document.getElementById('status-msg').innerHTML =
      `<span style="color:var(--ok)">✓ Файл найден в репозитории GitHub</span><br>
       <span style="color:var(--muted);font-size:0.72rem;">Перенаправление на RAW источник...</span>`;
  } else {
    document.getElementById('status-msg').innerHTML =
      `<span style="color:var(--void)">⚠ Файл отсутствует в GitHub</span><br>
       <span style="color:var(--muted);font-size:0.72rem;">Возможно, файл только в локальном репозитории. Откройте навигатор для поиска.</span>`;
  }
}).catch(() => {});

// Countdown auto-redirect
let n = 5;
const prog = document.getElementById('prog');
const tick = setInterval(() => {
  n--;
  document.getElementById('countdown').textContent = n;
  prog.style.width = ((5-n)/5*100) + '%';
  if (n <= 0) {
    clearInterval(tick);
    window.location.href = rawUrl;
  }
}, 1000);

// ── TUNNEL CANVAS ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let t = 0;
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
(function frame(){
  const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2;
  ctx.fillStyle='rgba(10,14,23,0.15)';
  ctx.fillRect(0,0,W,H);
  for(let i=0;i<12;i++){
    const p=((i/12)+(t*0.025))%1;
    const r=Math.pow(p,1.4)*Math.min(W,H)*0.7;
    const a=(1-p)*0.5;
    ctx.beginPath();
    for(let s=0;s<=6;s++){
      const ang=(s/6)*Math.PI*2-Math.PI/6+(t*0.003);
      s===0?ctx.moveTo(cx+r*Math.cos(ang),cy+r*Math.sin(ang)):
            ctx.lineTo(cx+r*Math.cos(ang),cy+r*Math.sin(ang));
    }
    ctx.strokeStyle=`rgba(79,195,247,${a})`;
    ctx.lineWidth=0.4+0.8*(1-p);
    ctx.stroke();
  }
  t++;
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
