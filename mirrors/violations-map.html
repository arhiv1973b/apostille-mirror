<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Violations Map — Apostille Case Moldova</title>
  <style>
    :root{--primary:#1a237e;--gold:#f9a825;--accent:#c62828;--bg:#f5f5f5}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg)}
    header{background:linear-gradient(135deg,var(--primary),#283593);color:white;
      padding:2rem;text-align:center;border-bottom:4px solid var(--gold)}
    header h1{font-size:1.8rem}
    nav{background:#283593;padding:0.5rem;text-align:center}
    nav a{color:#fff;text-decoration:none;margin:0 0.5rem;font-size:0.85rem;padding:0.3rem 0.6rem;border-radius:3px}
    nav a:hover{background:var(--gold);color:#000}
    .container{max-width:1000px;margin:0 auto;padding:1.5rem}
    .filters{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center}
    .filters label{font-weight:bold;color:var(--primary)}
    .filter-btn{background:#e8eaf6;border:none;padding:0.4rem 0.9rem;
      border-radius:20px;cursor:pointer;font-size:0.85rem;transition:all 0.2s}
    .filter-btn.active{background:var(--primary);color:white}
    .violation-card{background:white;border-radius:8px;padding:1.25rem;
      margin-bottom:1rem;box-shadow:0 2px 6px rgba(0,0,0,0.08);
      border-left:5px solid #ccc;display:flex;gap:1rem;align-items:flex-start}
    .violation-card.critical{border-left-color:#c62828}
    .violation-card.high{border-left-color:#e65100}
    .violation-card.medium{border-left-color:#f9a825}
    .v-date{min-width:90px;font-weight:bold;color:var(--primary);font-size:0.9rem}
    .v-body{flex:1}
    .v-title{font-weight:bold;margin-bottom:0.25rem}
    .v-desc{color:#555;font-size:0.9rem;line-height:1.6}
    .v-articles{margin-top:0.5rem;display:flex;flex-wrap:wrap;gap:0.4rem}
    .v-tag{background:#e8eaf6;color:#283593;padding:0.2rem 0.5rem;
      border-radius:3px;font-size:0.75rem;font-weight:bold}
    .level-badge{padding:0.2rem 0.5rem;border-radius:3px;
      font-size:0.75rem;font-weight:bold;margin-left:0.5rem}
    .critical .level-badge{background:#c62828;color:white}
    .high .level-badge{background:#e65100;color:white}
    .medium .level-badge{background:#f9a825;color:#000}
    .summary-bar{background:white;border-radius:8px;padding:1rem;
      margin-bottom:1.5rem;display:flex;gap:1rem;flex-wrap:wrap;
      box-shadow:0 2px 6px rgba(0,0,0,0.08)}
    .s-item{text-align:center;flex:1;min-width:100px}
    .s-num{font-size:2rem;font-weight:bold}
    .s-num.c{color:#c62828}.s-num.h{color:#e65100}.s-num.m{color:#f9a825}
    .s-label{font-size:0.8rem;color:#666}
  </style>
</head>
<body>
<nav>
  <a href="index.html">⚖️ Main</a>
  <a href="jus-cogens.html">⚡ Jus Cogens</a>
  <a href="treaties.html">📜 Treaties</a>
  <a href="apostilles.html">📋 Apostilles</a>
  <a href="evidence.html">🔍 Evidence</a>
</nav>
<header>
  <h1>🗺️ Violations Map — Moldova Apostille Case</h1>
  <p>Chronological analysis sorted by date and severity level relative to jus cogens</p>
</header>
<div class="container">

  <div class="summary-bar">
    <div class="s-item"><div class="s-num c" id="cnt-critical">0</div><div class="s-label">Critical</div></div>
    <div class="s-item"><div class="s-num h" id="cnt-high">0</div><div class="s-label">High</div></div>
    <div class="s-item"><div class="s-num m" id="cnt-medium">0</div><div class="s-label">Medium</div></div>
    <div class="s-item"><div class="s-num" style="color:var(--primary)" id="cnt-total">0</div><div class="s-label">Total</div></div>
  </div>

  <div class="filters">
    <span class="filters" style="display:inline">Filter:</span>
    <button class="filter-btn active" onclick="filter('all',this)">All</button>
    <button class="filter-btn" onclick="filter('critical',this)">Critical</button>
    <button class="filter-btn" onclick="filter('high',this)">High</button>
    <button class="filter-btn" onclick="filter('medium',this)">Medium</button>
  </div>

  <div id="violations-container"></div>
</div>

<script>
const violations = [
  {date:'1997',level:'critical',title:'First Apostille — Missing Authentication',
    desc:'Initial apostille issued without full compliance with Hague Convention Art. 3 authentication requirements. Beginning of systematic pattern.',
    articles:['Hague Conv. Art.3','Vienna Conv. Art.53']},
  {date:'1997–2006',level:'critical',title:'Batch Processing — 60 Apostilles with Defects',
    desc:'Over 9 years, 60 apostilles processed with systemic defects. 14.4% show unclear official signatures, violating mandatory authentication standards.',
    articles:['Hague Conv. Art.3','ECHR Art.6','Jus Cogens']},
  {date:'09.02.2009',level:'critical',title:'Constitutional Court — Refusal on Language Grounds',
    desc:'Application to Constitutional Court denied solely on language grounds. This constitutes a violation of the right to fair trial (ECHR Art. 6) and the right to effective remedy (Art. 13). Under Vienna Convention Art. 85, all languages are equally authentic.',
    articles:['ECHR Art.6','ECHR Art.13','Vienna Conv. Art.85']},
  {date:'2009–2019',level:'high',title:'Continued Apostille Processing Despite Complaints',
    desc:'Despite formal complaints, apostille processing continued without corrective measures. 30 additional apostilles issued in violation period.',
    articles:['Hague Conv. Art.3','Vienna Conv. Art.53']},
  {date:'02.05.2019',level:'high',title:'Ministry of Health — Obstruction of Access',
    desc:'Request to Ministry of Health regarding documentation denied without substantive justification. Violation of right to access public documents and effective remedy.',
    articles:['ECHR Art.13','ECHR Art.6']},
  {date:'05.12.2019',level:'high',title:'Toderița — Related Case',
    desc:'Parallel Toderița case demonstrates the systemic, not isolated, nature of Moldova apostille violations. Corroborating evidence for pattern of behavior.',
    articles:['Hague Conv. Art.3','ECHR Art.6']},
  {date:'2019–2023',level:'medium',title:'Failure to Investigate — Administrative Silence',
    desc:'Multiple administrative requests met with silence or procedural refusals. State obligation to investigate violations under ECHR not fulfilled.',
    articles:['ECHR Art.13','Vienna Conv. Art.26']},
  {date:'2024',level:'critical',title:'Civil Lawsuit Filed — €500,000',
    desc:'Formal civil claim filed against Republic of Moldova. Violations documented: ECHR Art. 3, 6, 13; Hague Convention; Vienna Convention Art. 53, 64. Total damages: €500,000 for period 1997–2026.',
    articles:['ECHR Art.3','ECHR Art.6','ECHR Art.13','Vienna Conv. Art.53','Vienna Conv. Art.64','Hague Conv.']},
  {date:'2026',level:'critical',title:'Diplomatic Notification — 129 Hague Member States',
    desc:'Pursuant to international law and jus cogens framework, diplomatic notifications dispatched to all 129 member states of the Hague Convention. Moldova bound — no derogation from jus cogens permitted.',
    articles:['Jus Cogens','Vienna Conv. Art.53','Vienna Conv. Art.64','Hague Conv.','ECHR']},
];

function renderViolations(filter) {
  const container = document.getElementById('violations-container');
  container.innerHTML = '';
  let c=0,h=0,m=0;
  violations.forEach(v => {
    if (filter!=='all' && v.level!==filter) return;
    if(v.level==='critical')c++;
    else if(v.level==='high')h++;
    else m++;
    const card = document.createElement('div');
    card.className = 'violation-card ' + v.level;
    card.innerHTML = `
      <div class="v-date">${v.date}</div>
      <div class="v-body">
        <div class="v-title">${v.title}<span class="level-badge">${v.level.toUpperCase()}</span></div>
        <div class="v-desc">${v.desc}</div>
        <div class="v-articles">${v.articles.map(a=>`<span class="v-tag">${a}</span>`).join('')}</div>
      </div>`;
    container.appendChild(card);
  });
  document.getElementById('cnt-critical').textContent = c;
  document.getElementById('cnt-high').textContent = h;
  document.getElementById('cnt-medium').textContent = m;
  document.getElementById('cnt-total').textContent = c+h+m;
}

function filter(level, btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderViolations(level);
}

renderViolations('all');
</script>
</body>
</html>
