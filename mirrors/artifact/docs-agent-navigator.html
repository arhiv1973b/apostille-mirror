let tAnim=null,tActive=false;
function startTunnel(cb){
  if(tActive){cb&&cb();return;}
  tActive=true;
  const ov=document.getElementById('tunnel-overlay'),lb=document.getElementById('tunnel-label');
  ov.classList.add('active');lb.classList.add('active');

  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2;let t=0;
  function frame(){
    ctx.clearRect(0,0,W,H);ctx.fillStyle='rgba(10,14,23,0.85)';ctx.fillRect(0,0,W,H);

      const p=((i/18)+(t*0.04))%1,r=Math.pow(p,1.5)*Math.min(W,H)*0.85,a=(1-p)*0.7;
      ctx.beginPath();
      for(let s=0;s<=6;s++){const ang=(s/6)*Math.PI*2-Math.PI/6+(t*0.005);s===0?ctx.moveTo(cx+r*Math.cos(ang),cy+r*Math.sin(ang)):ctx.lineTo(cx+r*Math.cos(ang),cy+r*Math.sin(ang));}
      ctx.strokeStyle=`rgba(79,195,247,${a})`;ctx.lineWidth=0.5+(1-p);ctx.stroke();
    }
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,60);g.addColorStop(0,'rgba(79,195,247,0.3)');g.addColorStop(1,'rgba(79,195,247,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    t++;tAnim=requestAnimationFrame(frame);
  }
  frame();
  setTimeout(()=>{tActive=false;cancelAnimationFrame(tAnim);ov.classList.remove('active');lb.classList.remove('active');ctx.clearRect(0,0,W,H);cb&&cb();},700);
}

// MD PARSER
function md(s){
  let h=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```[\w]*\n([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^---+$/gm,'<hr>')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/_(.+?)_/g,'<em>$1</em>').replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/^\|(.+)\|$/gm,(_,row)=>{if(row.match(/^[\s\-|]+$/))return'<tr data-sep></tr>';return'<tr>'+row.split('|').map(c=>`<td>${c.trim()}</td>`).join('')+'</tr>';})
    .replace(/^\* (.+)$/gm,'<li>$1</li>').replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/\n\n/g,'</p><p>');
  h=h.replace(/(<tr[^>]*>.*?<\/tr>\s*)+/gs,m=>{const rows=m.split('</tr>').filter(r=>r.trim());let o='<table>';rows.forEach((r,i)=>{if(r.includes('data-sep'))return;if(i===0)o+='<thead>'+r.replace(/td>/g,'th>')+'</tr></thead><tbody>';else o+=r+'</tr>';});return o+'</tbody></table>';});
  h=h.replace(/(<li>.*?<\/li>\s*)+/gs,m=>`<ul>${m}</ul>`);
  return'<p>'+h+'</p>';
}

// NAVIGATION
let cur=null;
function navigateTo(id){
  const p=PAGES.find(x=>x.id===id);if(!p)return;
  startTunnel(()=>renderPage(p));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
}
function renderPage(page){
  cur=page;
  const con=document.getElementById('page-container'),out=document.getElementById('md-output');
  document.getElementById('page-path').textContent='/'+page.path;
  document.getElementById('raw-btn').href=RAW+page.path;
  con.classList.add('loading');
  if(page.id==='home'){renderHome();con.classList.remove('loading');return;}
  if(page.status==='ok'){
    out.innerHTML=`<div style="text-align:center;padding:2rem 0"><div style="font-size:2rem;margin-bottom:1rem">⚡</div><div style="color:var(--ok);font-size:0.9rem;margin-bottom:0.5rem;font-weight:700">LIVE HTML PAGE</div><div style="color:var(--muted);font-size:0.8rem;margin-bottom:1.5rem">${page.path}</div><a href="${SITE}${page.path}" target="_blank" class="meta-btn" style="font-size:0.85rem;padding:8px 20px;color:var(--accent);border-color:var(--accent)">↗ ОТКРЫТЬ СТРАНИЦУ</a><div style="margin-top:1rem"><a href="${RAW}${page.path}" target="_blank" class="meta-btn">↗ RAW SOURCE</a></div>${page.desc?`<p style="margin-top:1.5rem;color:var(--muted);font-size:0.78rem;max-width:400px;margin:1.5rem auto">${page.desc}</p>`:''}</div>`;
    con.classList.remove('loading');return;
  }
  fetch(RAW+page.path).then(r=>{if(!r.ok)throw new Error('404');return r.text();})
    .then(text=>{
      const ext=page.path.split('.').pop().toLowerCase();
      out.innerHTML=ext==='md'?md(text):ext==='json'||ext==='txt'?`<pre style="white-space:pre-wrap;word-break:break-all">${text}</pre>`:md(text);
      con.classList.remove('loading');
    })
    .catch(()=>{
      out.innerHTML=`<div style="text-align:center;padding:2rem"><div style="font-size:2rem;color:var(--void);margin-bottom:0.75rem">⚠</div><div style="color:var(--void);font-weight:700;margin-bottom:0.5rem">ФАЙЛ НЕ НАЙДЕН В GITHUB</div><div style="color:var(--muted);font-size:0.78rem;margin-bottom:1.5rem">${page.path}</div><a href="${RAW+page.path}" target="_blank" class="meta-btn" style="border-color:var(--warn);color:var(--warn)">↗ RAW GITHUB</a><div style="margin-top:0.75rem"><a href="${SITE}${page.path}" target="_blank" class="meta-btn">↗ LIVE SITE</a></div></div>`;
      con.classList.remove('loading');
    });
}
function renderHome(){
  const out=document.getElementById('md-output');
  const groups={};PAGES.forEach(p=>{if(!groups[p.group])groups[p.group]=[];groups[p.group].push(p);});
  const vc=PAGES.filter(p=>p.status==='void').length,oc=PAGES.filter(p=>p.status==='ok').length,rc=PAGES.filter(p=>p.status==='raw').length;
  let html=`<div style="margin-bottom:1.5rem"><h1 style="color:var(--accent);font-size:1.2rem;margin-bottom:0.5rem">⚖️ EVIDENCE VAULT — AGENT NAVIGATOR</h1><p style="color:var(--muted);font-size:0.8rem">CASE-MACHERET-1997-2026 | Jus Cogens Integrity Protocol | ${PAGES.length} документов проиндексировано</p></div><div class="stats-bar"><div class="stat-item"><strong style="color:var(--ok)">${oc}</strong> Live HTML</div><div class="stat-item"><strong style="color:var(--warn)">${rc}</strong> Raw/MD</div><div class="stat-item"><strong style="color:var(--void)">${vc}</strong> Требует публикации</div><div class="stat-item"><strong>${PAGES.length}</strong> Всего</div></div>`;
  Object.entries(groups).forEach(([grp,pages])=>{
    html+=`<h2 style="font-size:0.8rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin:1.5rem 0 0.75rem">${grp}</h2><div class="index-grid">`;
    pages.forEach(p=>{const sl={ok:'LIVE',raw:'RAW→HTML',void:'404'}[p.status];html+=`<div class="index-card ${p.status}" onclick="navigateTo('${p.id}')"><div class="card-status">${sl}</div><div class="card-title">${p.title}</div><div class="card-path">${p.path||'/'}</div>${p.desc?`<div style="font-size:0.65rem;color:var(--muted);margin-top:6px">${p.desc}</div>`:''}</div>`;});
    html+='</div>';
  });
  out.innerHTML=html;
}

// SIDEBAR
function buildSidebar(){
  const sb=document.getElementById('sidebar');
  const groups={};PAGES.forEach(p=>{if(!groups[p.group])groups[p.group]=[];groups[p.group].push(p);});
  let html='';
  Object.entries(groups).forEach(([grp,pages])=>{
    html+=`<div class="sidebar-group"><div class="sidebar-group-title">▸ ${grp}</div>`;
    pages.forEach(p=>{const dc={ok:'dot-ok',raw:'dot-raw',void:'dot-void'}[p.status];html+=`<a class="nav-item" data-id="${p.id}" onclick="navigateTo('${p.id}')" href="javascript:void(0)"><span class="dot ${dc}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.title}</span><span class="nav-status">${p.status==='ok'?'✓':p.status==='raw'?'↗':'404'}</span></a>`;});
    html+='</div>';
  });
  sb.innerHTML=html;
  document.getElementById('hdr-void').textContent=PAGES.filter(p=>p.status==='void').length+' VOID';
  document.getElementById('hdr-ok').textContent=PAGES.filter(p=>p.status==='ok').length+' LIVE';
}
document.getElementById('search-input').addEventListener('input',function(){
  const q=this.value.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(el=>{el.style.display=(!q||el.querySelector('span').textContent.toLowerCase().includes(q))?'':'none';});
});
function copyPath(){if(!cur)return;navigator.clipboard.writeText(SITE+cur.path).then(()=>{const b=document.querySelector('[onclick="copyPath()"]');b.textContent='✓ COPIED';setTimeout(()=>{b.textContent='⎘ COPY PATH';},1500);});}
function handleHash(){const h=location.hash.slice(1);const p=PAGES.find(x=>x.id===h||x.path===h);p?navigateTo(p.id):navigateTo('home');}
window.addEventListener('hashchange',handleHash);
buildSidebar();
handleHash();
if(!location.hash)navigateTo('home');
</script>
