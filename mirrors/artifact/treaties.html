<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treaties Database — Jus Cogens</title>
  <style>
    :root{--primary:#1a237e;--gold:#f9a825;--accent:#c62828}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f5f5}
    header{background:linear-gradient(135deg,var(--primary),#283593);color:white;
      padding:2rem;text-align:center;border-bottom:4px solid var(--gold)}
    nav{background:#283593;padding:0.5rem;text-align:center}
    nav a{color:#fff;text-decoration:none;margin:0 0.5rem;font-size:0.85rem;
      padding:0.3rem 0.6rem;border-radius:3px}
    nav a:hover{background:var(--gold);color:#000}
    .container{max-width:900px;margin:0 auto;padding:1.5rem}
    .search-bar{display:flex;gap:0.5rem;margin-bottom:1.5rem}
    .search-bar input{flex:1;padding:0.6rem;border:2px solid #c5cae9;border-radius:6px;font-size:1rem}
    .search-bar input:focus{outline:none;border-color:var(--primary)}
    .treaty-card{background:white;border-radius:8px;padding:1.25rem;
      margin-bottom:1rem;box-shadow:0 2px 6px rgba(0,0,0,0.08)}
    .treaty-card h3{color:var(--primary);margin-bottom:0.5rem}
    .treaty-card p{color:#555;font-size:0.9rem;line-height:1.6}
    .treaty-meta{display:flex;gap:0.5rem;margin-top:0.75rem;flex-wrap:wrap}
    .tag{background:#e8eaf6;color:#283593;padding:0.2rem 0.5rem;
      border-radius:3px;font-size:0.75rem;font-weight:bold}
    .relevance{background:#c62828;color:white}
    .simulator{background:white;border-radius:8px;padding:1.5rem;margin-top:1.5rem;
      box-shadow:0 2px 6px rgba(0,0,0,0.08)}
    .simulator h2{color:var(--primary);margin-bottom:1rem}
    .sim-input{width:100%;padding:0.6rem;border:2px solid #c5cae9;border-radius:6px;margin-bottom:0.75rem}
    .sim-btn{background:var(--primary);color:white;border:none;padding:0.6rem 1.5rem;
      border-radius:6px;cursor:pointer}
    #sim-result{margin-top:1rem;padding:1rem;background:#e8f5e9;border-radius:6px;display:none}
  </style>
</head>
<body>
<nav>
  <a href="index.html">⚖️ Main</a>
  <a href="jus-cogens.html">⚡ Jus Cogens</a>
  <a href="violations-map.html">🗺️ Violations</a>
  <a href="apostilles.html">📋 Apostilles</a>
  <a href="evidence.html">🔍 Evidence</a>
</nav>
<header>
  <h1>📜 Treaties Database</h1>
  <p>International conventions binding on the Republic of Moldova</p>
</header>
<div class="container">
  <div class="search-bar">
    <input type="text" id="search" placeholder="Search treaties..." oninput="filterTreaties()">
  </div>
  <div id="treaties-list"></div>

  <div class="simulator">
    <h2>🔍 Treaty Conflict Simulator</h2>
    <p style="color:#555;margin-bottom:1rem">Enter a scenario to identify applicable treaties and jus cogens norms</p>
    <input class="sim-input" id="sim-input" type="text"
      placeholder="e.g., apostille signature unclear, court refused hearing...">
    <button class="sim-btn" onclick="simulate()">Analyze</button>
    <div id="sim-result"></div>
  </div>
</div>
<script>
const treaties = [
  {name:'Vienna Convention on the Law of Treaties',date:'23 May 1969',
    desc:'Governs the creation and interpretation of treaties between states. Articles 53 and 64 establish jus cogens norms — peremptory rules from which no derogation is permitted. Any act conflicting with jus cogens is void.',
    articles:['Art.26 Pacta sunt servanda','Art.53 Jus cogens','Art.64 New norms','Art.85 Languages'],
    relevance:'CRITICAL',keywords:'vienna jus cogens treaty void'},
  {name:'Hague Convention Abolishing the Requirement for Legalisation',date:'5 October 1961',
    desc:'Establishes the apostille system for authenticating public documents for international use. Article 3 requires clear official signatures and seals. Moldova\'s 14.4% unclear signature rate directly violates this convention.',
    articles:['Art.1 Scope','Art.3 Authentication','Art.4 Apostille form'],
    relevance:'CRITICAL',keywords:'hague apostille authentication signature'},
  {name:'European Convention on Human Rights',date:'4 November 1950',
    desc:'Protects fundamental rights in Council of Europe member states. Moldova ratified ECHR and is bound by all articles. Three specific articles violated in this case.',
    articles:['Art.3 No torture/inhuman treatment','Art.6 Fair trial','Art.13 Effective remedy'],
    relevance:'CRITICAL',keywords:'echr human rights fair trial remedy'},
  {name:'International Covenant on Civil and Political Rights',date:'16 December 1966',
    desc:'UN treaty establishing civil and political rights. Art. 26 prohibits discrimination including language-based discrimination in judicial proceedings — directly applicable to 2009 Constitutional Court refusal.',
    articles:['Art.7 No torture','Art.14 Fair trial','Art.26 Non-discrimination'],
    relevance:'HIGH',keywords:'iccpr discrimination language rights'},
  {name:'UN Charter',date:'26 June 1945',
    desc:'Foundational document of international order. Art. 2(1) establishes sovereign equality and Art. 55-56 commit states to human rights protection — binding Moldova to address apostille violations.',
    articles:['Art.2 Sovereign equality','Art.55-56 Human rights'],
    relevance:'HIGH',keywords:'un charter human rights sovereignty'},
  {name:'Vienna Convention on Consular Relations',date:'24 April 1963',
    desc:'Governs consular functions including authentication of documents. Apostilles issued through consular channels must comply with authentication standards — violated by Moldova\'s practices.',
    articles:['Art.5 Consular functions','Art.36 Communication'],
    relevance:'MEDIUM',keywords:'consular relations documents authentication'},
];

function renderTreaties(list) {
  const container = document.getElementById('treaties-list');
  container.innerHTML = '';
  list.forEach(t => {
    const div = document.createElement('div');
    div.className = 'treaty-card';
    div.innerHTML = `<h3>${t.name}</h3>
      <p><strong>Date:</strong> ${t.date}</p>
      <p style="margin-top:0.5rem">${t.desc}</p>
      <div class="treaty-meta">
        ${t.articles.map(a=>`<span class="tag">${a}</span>`).join('')}
        <span class="tag relevance">⚠️ ${t.relevance}</span>
      </div>`;
    container.appendChild(div);
  });
}

function filterTreaties() {
  const q = document.getElementById('search').value.toLowerCase();
  renderTreaties(q ? treaties.filter(t =>
    t.name.toLowerCase().includes(q) ||
    t.desc.toLowerCase().includes(q) ||
    t.keywords.includes(q)) : treaties);
}

function simulate() {
  const input = document.getElementById('sim-input').value.toLowerCase();
  const result = document.getElementById('sim-result');
  let findings = [];
  if (input.includes('signature') || input.includes('apostil') || input.includes('authentic'))
    findings.push('Hague Convention Art. 3 — Authentication requirement violated. Apostille void.');
  if (input.includes('court') || input.includes('trial') || input.includes('refused'))
    findings.push('ECHR Art. 6 — Right to fair trial violated. State responsibility engaged.');
  if (input.includes('language') || input.includes('язык'))
    findings.push('ECHR Art. 6 + Vienna Conv. Art. 85 — Language-based refusal violates equal authenticity norm.');
  if (input.includes('remedy') || input.includes('appeal'))
    findings.push('ECHR Art. 13 — No effective remedy provided. Jus cogens breach.');
  if (findings.length === 0)
    findings.push('Vienna Convention Art. 26 — Pacta sunt servanda. Moldova bound by all ratified treaties.');
  findings.push('Vienna Convention Art. 53 — If any act conflicts with jus cogens, it is VOID.');
  result.style.display = 'block';
  result.innerHTML = '<strong>Treaty Analysis:</strong><ul>' +
    findings.map(f=>`<li style="margin:0.4rem 0">${f}</li>`).join('') + '</ul>';
}

renderTreaties(treaties);
</script>
</body>
</html>
