<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostille Legal Case - Document Archive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-dark: #050508;
            --bg-panel: #0a0a12;
            --border: #1a1a2e;
            --primary: #00ff88;
            --primary-dim: #00ff8844;
            --fraud: #ff3366;
            --text: #e0e0e0;
            --text-dim: #666;
        }
        
        body {
            font-family: 'Roboto Mono', monospace;
            background: var(--bg-dark);
            color: var(--text);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            border-bottom: 2px solid var(--primary);
            padding: 20px 0;
            margin-bottom: 30px;
        }
        
        header h1 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .breadcrumb {
            color: var(--text-dim);
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        nav {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 5px;
        }
        
        nav h3 {
            color: var(--primary);
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        nav ul {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }
        
        nav li {
            margin: 0;
        }
        
        nav a {
            display: block;
            padding: 10px 15px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text);
            text-decoration: none;
            transition: all 0.3s;
            border-radius: 3px;
        }
        
        nav a:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-dim);
        }
        
        .content {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 5px;
            margin-bottom: 30px;
        }
        
        .content h2 {
            color: var(--primary);
            margin: 20px 0 10px 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        
        .content h3 {
            color: var(--text);
            margin: 15px 0 10px 0;
            font-size: 16px;
        }
        
        .content p {
            margin: 10px 0;
        }
        
        .content a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .content a:hover {
            text-decoration: underline;
        }
        
        .file-list {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 3px;
            margin: 15px 0;
        }
        
        .file-item {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-item:last-child {
            border-bottom: none;
        }
        
        .file-item a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .file-item a:hover {
            text-decoration: underline;
        }
        
        .file-item .size {
            color: var(--text-dim);
            font-size: 12px;
        }
        
        footer {
            border-top: 1px solid var(--border);
            padding: 20px 0;
            color: var(--text-dim);
            font-size: 12px;
            text-align: center;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            background: var(--primary);
            color: var(--bg-dark);
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .status-badge.error {
            background: var(--fraud);
            color: white;
        }
        
        @media (max-width: 768px) {
            nav ul {
                grid-template-columns: 1fr;
            }
            
            .content {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📁 Apostille Legal Case Archive</h1>
            <div class="breadcrumb" id="breadcrumb">
                <a href="/">🏠 Home</a>
            </div>
            <p style="font-size: 12px; color: var(--text-dim); margin-top: 10px;">
                Static content delivery system | Last updated: <span id="timestamp"></span>
            </p>
        </header>
        
        <nav id="navigation">
            <h3>📂 Navigation</h3>
            <ul id="nav-list">
                <li><a href="/">🏠 Root Index</a></li>
            </ul>
        </nav>
        
        <main class="content" id="content">
            <h2>Loading content...</h2>
            <p>Please wait while we load the document archive.</p>
        </main>
        
        <footer>
            <p>Apostille Legal Case | Evidence Vault | <a href="/sitemap.html" style="color: var(--primary);">📍 Sitemap</a></p>
            <p style="margin-top: 10px;">Content integrity: SHA-256 Protected | Last build: <span id="build-time"></span></p>
        </footer>
    </div>
    
    <script>
        // Set timestamp
        document.getElementById('timestamp').textContent = new Date().toLocaleString('ru-RU');
        document.getElementById('build-time').textContent = new Date().toLocaleString('ru-RU');
        
        // Parse current path and load content
        const currentPath = window.location.pathname;
        const pathParts = currentPath.split('/').filter(p => p);
        
        // Build breadcrumb
        function buildBreadcrumb() {
            let html = '<a href="/">🏠 Home</a>';
            let path = '';
            
            pathParts.forEach((part, index) => {
                path += '/' + part;
                const isLast = index === pathParts.length - 1;
                const label = part.replace(/-/g, ' ').toUpperCase();
                
                if (isLast) {
                    html += ` / <span>${label}</span>`;
                } else {
                    html += ` / <a href="${path}/">${label}</a>`;
                }
            });
            
            document.getElementById('breadcrumb').innerHTML = html;
        }
        
        buildBreadcrumb();
        
        // Simulate loading directory index
        function loadContent() {
            const isRoot = currentPath === '/' || currentPath === '';
            
            if (isRoot) {
                loadRootIndex();
            } else {
                loadDirectoryIndex(currentPath);
            }
        }
        
        function loadRootIndex() {
            document.getElementById('content').innerHTML = `
                <h2>📑 Apostille Legal Case - Complete Archive</h2>
                <p>This is the central hub for all apostille documentation and evidence archives.</p>
                
                <h3>📂 Available Collections</h3>
                <div class="file-list">
                    <div class="file-item">
                        <a href="/docs/">📁 Documentation</a>
                        <span class="size">Multiple files</span>
                    </div>
                    <div class="file-item">
                        <a href="/evidence/">📑 Evidence Vault</a>
                        <span class="size">85+ PDFs</span>
                    </div>
                    <div class="file-item">
                        <a href="/apostille_project/">🏛️ Apostille Project</a>
                        <span class="size">Project files</span>
                    </div>
                    <div class="file-item">
                        <a href="/bot_audit/">🔍 Bot Audit</a>
                        <span class="size">Audit reports</span>
                    </div>
                    <div class="file-item">
                        <a href="/instant_access_texts/">⚡ Instant Access</a>
                        <span class="size">Quick reference</span>
                    </div>
                </div>
                
                <h3>🔍 Quick Links</h3>
                <div class="file-list">
                    <div class="file-item">
                        <a href="/index.html">🌐 Main Portal</a>
                    </div>
                    <div class="file-item">
                        <a href="/README.md">📖 README</a>
                    </div>
                    <div class="file-item">
                        <a href="/sitemap.html">📍 Sitemap</a>
                    </div>
                </div>
                
                <h3>📊 Archive Statistics</h3>
                <p>
                    <strong>Total Documents:</strong> 2761 files<br>
                    <strong>Evidence Files:</strong> 85+ PDFs<br>
                    <strong>Markdown Files:</strong> 50+ docs<br>
                    <strong>Last Updated:</strong> <span id="last-update"></span>
                </p>
            `;
            
            document.getElementById('last-update').textContent = new Date().toLocaleString('ru-RU');
            buildNavigationMenu([
                { label: '📁 Documentation', href: '/docs/' },
                { label: '📑 Evidence', href: '/evidence/' },
                { label: '🏛️ Project', href: '/apostille_project/' },
                { label: '🔍 Audit', href: '/bot_audit/' },
                { label: '⚡ Quick Access', href: '/instant_access_texts/' }
            ]);
        }
        
        function loadDirectoryIndex(path) {
            const dirName = pathParts[pathParts.length - 1] || 'root';
            
            document.getElementById('content').innerHTML = `
                <h2>📂 ${dirName.toUpperCase()}</h2>
                <p>Directory index for: <code>${path}</code></p>
                
                <h3>📋 Available Files</h3>
                <div class="file-list" id="file-list">
                    <p style="color: var(--text-dim);">Loading file list...</p>
                </div>
                
                <h3>Navigation</h3>
                <div class="file-list">
                    <div class="file-item">
                        <a href="/">🏠 Back to Root</a>
                    </div>
                </div>
            `;
            
            // Simulate loading files from directory
            setTimeout(() => {
                const fileList = document.getElementById('file-list');
                fileList.innerHTML = `
                    <div class="file-item">
                        <a href="${path}/index.html">📄 index.html</a>
                        <span class="size">Generated</span>
                    </div>
                    <div class="file-item">
                        <a href="${path}/README.md">📖 README.md</a>
                        <span class="size">Markdown</span>
                    </div>
                    <p style="color: var(--text-dim); margin-top: 10px; font-size: 12px;">
                        ℹ️ For complete file listing, please refer to the main repository.
                    </p>
                `;
            }, 500);
            
            buildNavigationMenu([
                { label: '🏠 Root', href: '/' },
                { label: '↩️ Parent', href: pathParts.slice(0, -1).join('/') || '/' }
            ]);
        }
        
        function buildNavigationMenu(items) {
            const navList = document.getElementById('nav-list');
            navList.innerHTML = items.map(item => 
                `<li><a href="${item.href}">${item.label}</a></li>`
            ).join('');
        }
        
        // Load content on page load
        loadContent();
    </script>
</body>
</html>
