<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TI-ULA · SEARCH TERMINAL</title>
    <style>
        body { background: #0a0e1a; color: #e2e8f0; font-family: 'Courier New', monospace; padding: 20px; }
        #search-box { width: 100%; padding: 15px; background: #111827; border: 1px solid #1e3a5f; color: #3b82f6; font-size: 16px; margin-bottom: 20px; }
        .result-item { padding: 10px; border-bottom: 1px solid #1e3a5f; font-size: 14px; }
        .result-item a { color: #3b82f6; text-decoration: none; }
        .result-item a:hover { text-decoration: underline; }
        .badge { color: #d4af37; font-weight: bold; margin-right: 10px; }
        #manifest-shield { margin-bottom: 20px; padding: 10px; border: 1px solid #1e3a5f; background: #111827; font-size: 12px; color: #3b82f6; }
    </style>
</head>
<body>
    <div id="manifest-shield"><b>АКТИВНЫЕ УЗЛЫ TI-ULA:</b> 361(ПОДЛОГ), ЦЕНЗУРА, Art.3(ПЫТКИ), Art.6(СУД), GENEALOGY</div>
    <input type="text" id="search-box" placeholder="Введите ключевое слово (например: 361, суд, Марков)...">
    <div id="results"></div>

    <script>
        let index = [];
        fetch('evidence_index.json').then(r => r.json()).then(data => { index = data; });

        document.getElementById('search-box').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            
            if (query.length < 2) return;

            const filtered = index.filter(item => item.name.toLowerCase().includes(query));
            filtered.forEach(item => {
                const isVerified = item.name.includes('подписан') || item.name.includes('signed');
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `${isVerified ? '<span class="badge">[🛡️ VERIFIED]</span>' : ''} <a href="${item.url}" target="_blank">${item.name}</a>`;
                resultsDiv.appendChild(div);
            });
        });
    </script>
</body>
</html>
